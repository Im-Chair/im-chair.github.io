<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="掃雷">
  <meta name="theme-color" content="#0a0a0a">
  <title>掃雷</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0a0a0a;
      --surface: #161616;
      --surface2: #2e2e2e;
      --border: #484848;
      --text: #f0ede8;
      --muted: #555;
      --accent: #e8d5a3;
      --accent-dim: rgba(232,213,163,0.12);
      --flag: #e05c5c;
      --mine: #e05c5c;
      --open: #111;
      --n1: #5b9bd5; --n2: #5dab6e; --n3: #e05c5c; --n4: #7c5cbf;
      --n5: #c0392b; --n6: #1abc9c; --n7: #2c3e50; --n8: #888;
    }
    body {
      font-family: -apple-system, 'SF Pro Display', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; min-height: -webkit-fill-available;
      display: flex; flex-direction: column; align-items: center;
      overflow-x: hidden;
    }
    #app {
      width: 100%; max-width: 480px;
      padding: max(20px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: 14px;
    }

    /* Header */
    .header { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .logo em { color: var(--accent); font-style: normal; }
    .timer-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 10px; padding: 6px 14px;
    }
    .timer { font-size: 18px; font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: 1px; color: var(--accent); }

    /* Difficulty */
    .difficulty { display: flex; gap: 6px; }
    .diff-btn {
      flex: 1; padding: 9px 0; border-radius: 10px;
      border: 0.5px solid var(--border); background: var(--surface);
      color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.15s;
    }
    .diff-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* Info row */
    .info-row { display: flex; gap: 8px; }
    .info-box {
      flex: 1; background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 12px; padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .info-label { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
    .info-value { font-size: 20px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
    .info-value.red { color: var(--flag); }

    /* Toolbar */
    .toolbar { display: flex; gap: 8px; }
    .tool-btn {
      flex: 1; padding: 11px 0; border-radius: 12px;
      border: 0.5px solid var(--border); background: var(--surface);
      color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.15s;
    }
    .tool-btn .icon { font-size: 16px; }
    .tool-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .tool-btn:active { opacity: 0.6; }
    #flag-btn.flag-active { background: rgba(224,92,92,0.12); border-color: var(--flag); color: var(--flag); }

    /* Board wrapper — scrollable */
    .board-scroll {
      overflow: auto; -webkit-overflow-scrolling: touch;
      border-radius: 14px;
    }
    .board-wrap {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 14px; padding: 8px; display: inline-block; min-width: 100%;
    }
    .board {
      display: grid; gap: 2px;
    }

    /* Cells */
    .cell {
      width: var(--cell-size); height: var(--cell-size);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--cell-font); font-weight: 700;
      cursor: pointer; user-select: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      transition: background 0.08s, transform 0.08s;
      position: relative;
    }
    .cell:active { transform: scale(0.88); }
    .cell.revealed {
      background: #0f0f0f; border-color: #1c1c1c;
      box-shadow: none; cursor: default;
    }
    .cell.revealed:active { transform: none; }
    .cell.flagged { background: rgba(224,92,92,0.15); border-color: rgba(224,92,92,0.5); }
    .cell.mine-hit { background: rgba(224,92,92,0.25); border-color: var(--mine); }
    .cell.mine-show { background: #0f0f0f; border-color: #1c1c1c; box-shadow: none; }
    .cell[data-n="1"] { color: var(--n1); }
    .cell[data-n="2"] { color: var(--n2); }
    .cell[data-n="3"] { color: var(--n3); }
    .cell[data-n="4"] { color: var(--n4); }
    .cell[data-n="5"] { color: var(--n5); }
    .cell[data-n="6"] { color: var(--n6); }
    .cell[data-n="7"] { color: var(--n7); }
    .cell[data-n="8"] { color: var(--n8); }

    /* Win/lose overlay */
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(10px);
    }
    #overlay.show { display: flex; }
    .result-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 24px; padding: 36px 32px; text-align: center;
      max-width: 290px; width: 88%;
      animation: popUp 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popUp { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .result-emoji { font-size: 52px; margin-bottom: 12px; }
    .result-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .result-stats { font-size: 14px; color: var(--muted); line-height: 1.8; margin-bottom: 24px; }
    .result-stats b { color: var(--text); }
    .result-btn {
      width: 100%; padding: 13px; border-radius: 12px; border: none;
      background: var(--accent); color: #0a0a0a; font-size: 16px; font-weight: 700; cursor: pointer;
    }

    .home-btn {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      z-index: 999;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      text-decoration: none;
      font-family: -apple-system, sans-serif;
      font-weight: 500;
    }
  </style>
</head>
<body>
<a class="home-btn" href="/">🏠 回大廳</a>
<div id="app">
  <div class="header">
    <div class="logo">掃<em>雷</em></div>
    <div class="timer-box">
      <span style="font-size:13px;color:var(--muted)">⏱</span>
      <span class="timer" id="timer">000</span>
    </div>
  </div>

  <div class="difficulty">
    <button class="diff-btn active" data-level="easy">簡單<br><span style="font-size:10px;color:inherit;opacity:0.6">9×9 · 10雷</span></button>
    <button class="diff-btn" data-level="medium">中等<br><span style="font-size:10px;color:inherit;opacity:0.6">16×16 · 40雷</span></button>
    <button class="diff-btn" data-level="hard">困難<br><span style="font-size:10px;color:inherit;opacity:0.6">30×16 · 99雷</span></button>
  </div>

  <div class="info-row">
    <div class="info-box">
      <span class="info-label">💣 剩餘地雷</span>
      <span class="info-value red" id="mine-count">10</span>
    </div>
    <div class="info-box">
      <span class="info-label">✅ 已翻開</span>
      <span class="info-value" id="open-count">0</span>
    </div>
  </div>

  <div class="toolbar">
    <button class="tool-btn" id="flag-btn">
      <span class="icon">🚩</span> 插旗模式
    </button>
    <button class="tool-btn" id="new-btn">
      <span class="icon">↺</span> 新遊戲
    </button>
  </div>

  <div class="board-scroll">
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
  </div>
</div>

<div id="overlay">
  <div class="result-card">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-stats" id="result-stats"></div>
    <button class="result-btn" id="result-btn">再來一局</button>
  </div>
</div>

<script>
const LEVELS = {
  easy:   { rows: 9,  cols: 9,  mines: 10 },
  medium: { rows: 16, cols: 16, mines: 40 },
  hard:   { rows: 16, cols: 30, mines: 99 },
};

let state = {
  level: 'easy',
  rows: 9, cols: 9, mines: 10,
  board: [],      // 0-8 = number, -1 = mine
  revealed: [],   // bool
  flagged: [],    // bool
  firstClick: true,
  flagMode: false,
  gameOver: false,
  won: false,
  startTime: 0,
  elapsed: 0,
  timerInterval: null,
  openCount: 0,
};

function setCellSize(cols) {
  const boardEl = document.getElementById('board');
  const maxW = Math.min(window.innerWidth - 28, 480 - 28) - 16; // padding
  const size = Math.min(36, Math.floor((maxW - (cols-1)*2) / cols));
  boardEl.style.setProperty('--cell-size', size + 'px');
  boardEl.style.setProperty('--cell-font', Math.max(10, size - 10) + 'px');
  boardEl.style.gridTemplateColumns = `repeat(${cols}, ${size}px)`;
}

function newGame(level) {
  const cfg = LEVELS[level];
  stopTimer();
  state = {
    level,
    rows: cfg.rows, cols: cfg.cols, mines: cfg.mines,
    board: Array(cfg.rows * cfg.cols).fill(0),
    revealed: Array(cfg.rows * cfg.cols).fill(false),
    flagged: Array(cfg.rows * cfg.cols).fill(false),
    firstClick: true,
    flagMode: false,
    gameOver: false,
    won: false,
    startTime: 0,
    elapsed: 0,
    timerInterval: null,
    openCount: 0,
  };
  document.getElementById('flag-btn').classList.remove('flag-active');
  document.getElementById('timer').textContent = '000';
  document.getElementById('mine-count').textContent = cfg.mines;
  document.getElementById('open-count').textContent = '0';
  document.getElementById('overlay').classList.remove('show');
  buildBoard();
  setCellSize(cfg.cols);
}

function placeMines(safeIdx) {
  const total = state.rows * state.cols;
  const indices = Array.from({length: total}, (_, i) => i).filter(i => i !== safeIdx);
  shuffle(indices);
  for (let i = 0; i < state.mines; i++) state.board[indices[i]] = -1;
  // calculate numbers
  for (let idx = 0; idx < total; idx++) {
    if (state.board[idx] === -1) continue;
    state.board[idx] = countAdjacentMines(idx);
  }
}

function countAdjacentMines(idx) {
  let count = 0;
  for (const n of neighbors(idx)) { if (state.board[n] === -1) count++; }
  return count;
}

function neighbors(idx) {
  const r = Math.floor(idx / state.cols), c = idx % state.cols;
  const result = [];
  for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
    if (dr === 0 && dc === 0) continue;
    const nr = r + dr, nc = c + dc;
    if (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols)
      result.push(nr * state.cols + nc);
  }
  return result;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function reveal(idx) {
  if (state.revealed[idx] || state.flagged[idx]) return;
  state.revealed[idx] = true;
  state.openCount++;

  if (state.board[idx] === 0) {
    for (const n of neighbors(idx)) reveal(n);
  }
}

function handleClick(idx) {
  if (state.gameOver) return;
  if (state.flagMode) { toggleFlag(idx); return; }
  if (state.revealed[idx]) {
    // chord: if flagged neighbors == number, reveal rest
    chord(idx); return;
  }
  if (state.flagged[idx]) return;

  if (state.firstClick) {
    state.firstClick = false;
    placeMines(idx);
    startTimer();
  }

  if (state.board[idx] === -1) {
    // hit mine
    state.gameOver = true;
    stopTimer();
    state.revealed[idx] = true;
    showAllMines(idx);
    renderBoard();
    setTimeout(() => showResult(false), 400);
    return;
  }

  reveal(idx);
  renderBoard();
  checkWin();
}

function chord(idx) {
  if (!state.revealed[idx] || state.board[idx] <= 0) return;
  const flagCount = neighbors(idx).filter(n => state.flagged[n]).length;
  if (flagCount !== state.board[idx]) return;
  let hitMine = false;
  for (const n of neighbors(idx)) {
    if (!state.flagged[n] && !state.revealed[n]) {
      if (state.board[n] === -1) hitMine = true;
      reveal(n);
    }
  }
  if (hitMine) {
    state.gameOver = true;
    stopTimer();
    showAllMines(-1);
    renderBoard();
    setTimeout(() => showResult(false), 400);
    return;
  }
  renderBoard();
  checkWin();
}

function toggleFlag(idx) {
  if (state.revealed[idx] || state.gameOver || state.firstClick) return;
  state.flagged[idx] = !state.flagged[idx];
  const remaining = state.mines - state.flagged.filter(Boolean).length;
  document.getElementById('mine-count').textContent = remaining;
  renderBoard();
}

function showAllMines(hitIdx) {
  for (let i = 0; i < state.board.length; i++) {
    if (state.board[i] === -1) state.revealed[i] = true;
  }
}

function checkWin() {
  const safe = state.rows * state.cols - state.mines;
  if (state.openCount >= safe) {
    state.won = true;
    state.gameOver = true;
    stopTimer();
    renderBoard();
    setTimeout(() => showResult(true), 300);
  }
  document.getElementById('open-count').textContent = state.openCount;
}

function showResult(won) {
  document.getElementById('result-emoji').textContent = won ? '🎉' : '💥';
  document.getElementById('result-title').textContent = won ? '成功排雷！' : '踩到地雷！';
  const lvlMap = { easy:'簡單', medium:'中等', hard:'困難' };
  document.getElementById('result-stats').innerHTML = won
    ? `難度：<b>${lvlMap[state.level]}</b><br>時間：<b>${formatTime(state.elapsed)}</b>`
    : `難度：<b>${lvlMap[state.level]}</b><br>撐了：<b>${formatTime(state.elapsed)}</b>`;
  document.getElementById('overlay').classList.add('show');
}

function formatTime(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function startTimer() {
  state.startTime = Date.now();
  state.timerInterval = setInterval(() => {
    state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
    document.getElementById('timer').textContent = String(state.elapsed).padStart(3, '0');
  }, 1000);
}
function stopTimer() { clearInterval(state.timerInterval); }

// ── Render ──
function buildBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let i = 0; i < state.rows * state.cols; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.addEventListener('click', () => handleClick(i));
    boardEl.appendChild(cell);
  }
}

function renderBoard() {
  const cells = document.getElementById('board').children;
  let openCount = 0;
  for (let i = 0; i < state.rows * state.cols; i++) {
    const cell = cells[i];
    cell.className = 'cell';
    cell.textContent = '';
    cell.removeAttribute('data-n');

    if (state.flagged[i] && !state.revealed[i]) {
      cell.classList.add('flagged');
      cell.textContent = '🚩';
    } else if (state.revealed[i]) {
      if (state.board[i] === -1) {
        cell.classList.add(i === state.hitMine ? 'mine-hit' : 'mine-show');
        cell.textContent = '💣';
      } else {
        cell.classList.add('revealed');
        if (state.board[i] > 0) {
          cell.textContent = state.board[i];
          cell.setAttribute('data-n', state.board[i]);
        }
        openCount++;
      }
    }
  }
  document.getElementById('open-count').textContent = openCount;
}

// ── Controls ──
document.getElementById('flag-btn').addEventListener('click', () => {
  state.flagMode = !state.flagMode;
  document.getElementById('flag-btn').classList.toggle('flag-active', state.flagMode);
});

document.getElementById('new-btn').addEventListener('click', () => newGame(state.level));
document.getElementById('result-btn').addEventListener('click', () => newGame(state.level));

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    newGame(btn.dataset.level);
  });
});

window.addEventListener('resize', () => setCellSize(state.cols));

// ── Init ──
newGame('easy');
</script>
</body>
</html>
