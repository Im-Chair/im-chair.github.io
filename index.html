<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ARCADE">
  <meta name="theme-color" content="#080808">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <title>ARCADE</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #080808;
      --ink: #f2f0ea;
      --ink2: rgba(242,240,234,0.45);
      --ink3: rgba(242,240,234,0.18);
      --accent: #c8f135;
      --accent2: #f1c135;
      --card: #111110;
      --card-border: rgba(242,240,234,0.08);
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-mono);
      overflow-x: hidden;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px;
      padding-top: max(48px, env(safe-area-inset-top));
      padding-bottom: max(48px, env(safe-area-inset-bottom));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }
    .header-eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--ink3);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .header-title {
      font-family: var(--font-display);
      font-size: clamp(52px, 18vw, 80px);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 0.9;
      color: var(--ink);
    }
    .header-title span {
      color: var(--accent);
      display: inline-block;
      animation: flicker 6s infinite 2s;
    }
    @keyframes flicker {
      0%,95%,97%,100% { opacity: 1; }
      96% { opacity: 0.2; }
    }
    .header-sub {
      margin-top: 16px;
      font-size: 12px;
      color: var(--ink2);
      letter-spacing: 0.05em;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      animation: fadeUp 0.6s ease 0.1s both;
    }
    .divider-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink3);
      white-space: nowrap;
    }
    .divider-line {
      flex: 1;
      height: 0.5px;
      background: var(--card-border);
    }

    /* ── Game grid ── */
    .games {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
    }

    /* ── Game card ── */
    .game-card {
      display: block;
      text-decoration: none;
      background: var(--card);
      border: 0.5px solid var(--card-border);
      border-radius: 16px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.5s ease both;
    }
    .game-card:nth-child(1) { animation-delay: 0.15s; }
    .game-card:nth-child(2) { animation-delay: 0.25s; }
    .game-card:nth-child(3) { animation-delay: 0.35s; }

    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, var(--card-accent, transparent) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .game-card:active {
      transform: scale(0.975);
    }
    .game-card:hover {
      border-color: rgba(242,240,234,0.2);
    }
    .game-card:hover::before {
      opacity: 1;
    }

    .game-card.available {
      --card-accent: rgba(200, 241, 53, 0.06);
      cursor: pointer;
    }
    .game-card.coming-soon {
      opacity: 0.5;
      cursor: default;
      pointer-events: none;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: rgba(242,240,234,0.05);
      border: 0.5px solid var(--card-border);
      flex-shrink: 0;
    }
    .card-status {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      border: 0.5px solid;
    }
    .card-status.ready {
      color: var(--accent);
      border-color: rgba(200,241,53,0.3);
      background: rgba(200,241,53,0.07);
    }
    .card-status.soon {
      color: var(--ink3);
      border-color: var(--card-border);
    }

    .card-name {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 12px;
      color: var(--ink2);
      line-height: 1.6;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 0.5px solid var(--card-border);
    }
    .card-tags {
      display: flex;
      gap: 6px;
    }
    .tag {
      font-size: 10px;
      color: var(--ink3);
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(242,240,234,0.04);
      border: 0.5px solid var(--card-border);
      letter-spacing: 0.05em;
    }
    .card-arrow {
      font-size: 16px;
      color: var(--ink3);
      transition: transform 0.2s, color 0.2s;
    }
    .game-card:hover .card-arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      gap: 0;
      border: 0.5px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 32px;
      animation: fadeUp 0.5s ease 0.4s both;
    }
    .stat {
      flex: 1;
      padding: 14px 0;
      text-align: center;
      border-right: 0.5px solid var(--card-border);
    }
    .stat:last-child { border-right: none; }
    .stat-value {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      display: block;
    }
    .stat-label {
      font-size: 10px;
      color: var(--ink3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: block;
      margin-top: 2px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: auto;
      padding-top: 24px;
      border-top: 0.5px solid var(--card-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeUp 0.5s ease 0.5s both;
    }
    .footer-left {
      font-size: 11px;
      color: var(--ink3);
      letter-spacing: 0.05em;
    }
    .footer-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    .footer-right {
      font-size: 11px;
      color: var(--ink3);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div id="app">

  <header class="header">
    <div class="header-eyebrow">im-chair · 遊戲集</div>
    <div class="header-title">ARC<span>A</span>DE</div>
    <div class="header-sub">// 手工打造的小遊戲，離線可玩</div>
  </header>

  <div class="divider">
    <span class="divider-label">遊戲列表</span>
    <div class="divider-line"></div>
  </div>

  <div class="games">

    <!-- 數獨 -->
    <a class="game-card available" href="./sudoku/">
      <div class="card-top">
        <div class="card-icon">⊞</div>
        <span class="card-status ready">可遊玩</span>
      </div>
      <div class="card-name">數獨</div>
      <div class="card-desc">四種難度，筆記模式，計時挑戰。</div>
      <div class="card-footer">
        <div class="card-tags">
          <span class="tag">益智</span>
          <span class="tag">離線</span>
          <span class="tag">單人</span>
        </div>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <!-- 掃雷 -->
    <a class="game-card available" href="./minesweeper/">
      <div class="card-top">
        <div class="card-icon">💣</div>
        <span class="card-status ready">可遊玩</span>
      </div>
      <div class="card-name">掃雷</div>
      <div class="card-desc">三種難度，插旗模式，計時挑戰。</div>
      <div class="card-footer">
        <div class="card-tags">
          <span class="tag">邏輯</span>
          <span class="tag">離線</span>
          <span class="tag">單人</span>
        </div>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <!-- 幾A幾B -->
    <a class="game-card available" href="./bulls-cows/">
      <div class="card-top">
        <div class="card-icon">🔢</div>
        <span class="card-status ready">可遊玩</span>
      </div>
      <div class="card-name">幾A幾B</div>
      <div class="card-desc">猜4位不重複數字，A對位置，B對數字。</div>
      <div class="card-footer">
        <div class="card-tags">
          <span class="tag">推理</span>
          <span class="tag">離線</span>
          <span class="tag">單人</span>
        </div>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <!-- 接龍 -->
    <a class="game-card available" href="./solitaire/">
      <div class="card-top">
        <div class="card-icon">🃏</div>
        <span class="card-status ready">可遊玩</span>
      </div>
      <div class="card-name">接龍</div>
      <div class="card-desc">翻1張或翻3張，悔棋無限，經典紙牌。</div>
      <div class="card-footer">
        <div class="card-tags">
          <span class="tag">紙牌</span>
          <span class="tag">離線</span>
          <span class="tag">單人</span>
        </div>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <!-- 預留 slot -->
    <div class="game-card coming-soon">
      <div class="card-top">
        <div class="card-icon">？</div>
        <span class="card-status soon">開發中</span>
      </div>
      <div class="card-name">???</div>
      <div class="card-desc">下一個遊戲即將登場。</div>
      <div class="card-footer">
        <div class="card-tags"><span class="tag">敬請期待</span></div>
      </div>
    </div>

    <!-- 預留 slot 3 -->
    <div class="game-card coming-soon">
      <div class="card-top">
        <div class="card-icon">⚔</div>
        <span class="card-status soon">規劃中</span>
      </div>
      <div class="card-name">RPG</div>
      <div class="card-desc">有故事、刷裝備、選職業的暗黑風 RPG。</div>
      <div class="card-footer">
        <div class="card-tags">
          <span class="tag">RPG</span>
          <span class="tag">動作</span>
          <span class="tag">大作</span>
        </div>
      </div>
    </div>

  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-value" id="game-count">4</span>
      <span class="stat-label">遊戲</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="play-count">0</span>
      <span class="stat-label">遊玩次數</span>
    </div>
    <div class="stat">
      <span class="stat-value">∞</span>
      <span class="stat-label">離線可用</span>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-left">
      <span class="footer-dot"></span>手工製作中
    </div>
    <div class="footer-right" id="footer-date"></div>
  </footer>

</div>

<script>
  // 顯示今天日期
  const d = new Date();
  document.getElementById('footer-date').textContent =
    d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0');

  // 遊玩次數（localStorage）
  const plays = parseInt(localStorage.getItem('arcade-plays') || '0');
  document.getElementById('play-count').textContent = plays;

  // 點進遊戲時記錄
  document.querySelectorAll('.game-card.available').forEach(card => {
    card.addEventListener('click', () => {
      const n = parseInt(localStorage.getItem('arcade-plays') || '0') + 1;
      localStorage.setItem('arcade-plays', n);
    });
  });
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
