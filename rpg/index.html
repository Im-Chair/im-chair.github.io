<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0d12">
<title>貪婪深淵</title>
<link rel="stylesheet" href="style.css?v=347">
</head>
<body>
<div id="app">

<!-- ===== 標題 ===== -->
<div class="screen" id="s-title">
  <div class="spacer"></div>
  <h1 class="title">貪婪深淵</h1>
  <div class="subtitle">深入一層，或帶著一切離開</div>
  <div style="text-align:center;color:var(--dim);font-size:12px;letter-spacing:2px;margin-top:8px">V3.47</div>
  <div class="spacer"></div>
  <button class="btn primary" onclick="titleStart()">進入深淵</button>
  <div style="height:10px"></div>
  <button class="btn danger" id="btn-wipe" onclick="wipeConfirm()" style="display:none">放棄一切重新開始</button>
  <div class="spacer"></div>
  <div style="text-align:center;color:var(--dim);font-size:10px;line-height:1.6;opacity:.55;padding:0 12px">
    部分圖示來自 <a href="https://game-icons.net" target="_blank" rel="noopener" style="color:inherit">game-icons.net</a><br>
    作者：Lorc、Delapouite、Skoll、DarkZaitzev、Cathelineau、Carl Olsen — 授權 CC BY 3.0
  </div>
</div>

<!-- ===== 職業 ===== -->
<div class="screen" id="s-class">
  <div class="section-title">選擇你的職業</div>
  <div class="class-grid" id="class-grid"></div>
  <div class="spacer"></div>
  <button class="btn primary" onclick="confirmClass()">就是他了</button>
</div>

<!-- ===== 營地 ===== -->
<div class="screen" id="s-camp">
  <div class="camp-scene">
    <div class="ov-title">貪婪深淵</div>
    <div class="ov-gold">🪙 <span id="camp-gold">0</span></div>
    <div class="ov-gem">💎 <span id="camp-gem">0</span></div>
    <div class="ov-hero" onclick="openRoster()">
      <span class="ov-hero-ic" id="camp-cls-ic"></span>
      <span class="ov-hero-tx"><span class="ov-hero-cls" id="camp-cls"></span><span class="ov-hero-cert" id="camp-cert"></span></span>
    </div>
    <div class="hot" data-fx=".579" data-fy=".286" data-fw=".24" data-fh=".11" onclick="openBounties()"><span class="hot-badge" id="bounty-badge"></span></div>
    <div class="hot" data-fx=".435" data-fy=".406" data-fw=".20" data-fh=".09" onclick="openGear()"></div>
    <div class="hot" data-fx=".199" data-fy=".412" data-fw=".24" data-fh=".12" onclick="openRunStats()"></div>
    <div class="hot" data-fx=".824" data-fy=".487" data-fw=".24" data-fh=".11" onclick="openSmith()"></div>
    <div class="hot" data-fx=".50" data-fy=".575" data-fw=".26" data-fh=".13" onclick="openDivePicker()"></div>
    <div class="hot" data-fx=".324" data-fy=".693" data-fw=".22" data-fh=".11" onclick="openCodex()"></div>
    <div class="hot" data-fx=".815" data-fy=".824" data-fw=".24" data-fh=".12" onclick="if(G.rec.deep>=30)openMarket();else toast('深入 30 層後解鎖深淵黑市')"></div>
    <div class="hot" data-fx=".208" data-fy=".87" data-fw=".26" data-fh=".11" onclick="openSaveMgr()"></div>
  </div>
</div>

<!-- ===== 裝備 ===== -->
<div class="screen" id="s-gear">
  <span class="back-link" onclick="showScreen('s-camp')">‹ 回營地</span>
  <div class="section-title">身上裝備</div>
  <div class="slot-row" id="equip-row"></div>
  <div class="section-title">倉庫 <span id="gear-gold" style="float:right;color:var(--gold)"></span></div>
  <div class="item-list" id="stash-list"></div>
</div>

<!-- ===== 鐵匠 ===== -->
<div class="screen" id="s-smith">
  <span class="back-link" onclick="showScreen('s-camp')">‹ 回營地</span>
  <div class="center-box" style="padding:10px 0">
    <div class="big">⚒️</div>
    <p>把碎銀交給老鐵匠，他會替你把裝備敲得更兇。</p>
  </div>
  <div class="item-list" id="smith-list"></div>
  <p style="color:var(--dim);font-size:12px;margin-top:12px">強化直接附在該件裝備上；分解裝備時強化不會退款。</p>
</div>

<!-- ===== 抉擇（門）===== -->
<div class="screen" id="s-doors">
  <div class="topbar">
    <span class="depth">第 <span id="d-floor">1</span> 層</span>
    <span id="d-hp"></span>
    <span class="gold-chip">🪙 <span id="d-gold">0</span></span>
  </div>
  <div class="depth-gauge">
    <div class="lbl">目前深度</div>
    <div class="num" id="d-floor-big">1</div>
    <div class="bonus" id="d-bonus"></div>
  </div>
  <div class="door-grid" id="door-grid"></div>
  <button class="btn retreat-btn" id="retreat-btn" onclick="retreat()" style="display:none">🪢 使用逃脫之繩——活著離開，記錄這趟深度</button>
  <div class="rope-hint" id="rope-hint"></div>
  <div style="height:8px"></div>
  <button class="btn" style="font-size:14px" onclick="openRunStats()">🧍 角色檢視 <span id="bag-hint" style="color:var(--dim);font-size:12px"></span></button>
  <div class="potion-row" id="door-potions"></div>
</div>

<!-- ===== 戰鬥 ===== -->
<div class="screen" id="s-battle">
  <div class="topbar">
    <span class="depth">第 <span id="b-floor">1</span> 層</span>
    <span class="gold-chip">🪙 <span id="b-gold">0</span></span>
  </div>
  <div class="enemy-zone" id="enemy-zone"></div>
  <div id="log"></div>
  <div class="player-zone" id="player-zone" style="position:relative">
    <div class="pz-top" onclick="openRunStats()">
      <span class="pname" id="p-name"></span>
      <span class="st blk" id="p-block" style="display:none"></span>
      <span class="energy" id="p-energy"></span>
    </div>
    <div class="hpbar player"><div class="fill" id="p-hpfill"></div><div class="txt" id="p-hptxt"></div></div>
    <div class="status-row" id="p-status"></div>
    <div class="skill-grid" id="skill-grid"></div>
    <div class="battle-bottom">
      <button class="btn" style="flex:0 0 30%" onclick="openBattlePotions()">🧪 道具</button>
      <button class="btn primary" id="btn-end" onclick="endTurn()">結束回合</button>
    </div>
  </div>
</div>

<!-- ===== 事件 ===== -->
<div class="screen" id="s-event">
  <div class="topbar">
    <span class="depth">第 <span id="ev-floor">1</span> 層</span>
    <span class="gold-chip">🪙 <span id="ev-gold">0</span></span>
  </div>
  <div class="center-box" style="margin:0;padding:8px 0"><div class="big" id="ev-icon">❓</div>
  <h2 id="ev-title"></h2></div>
  <div class="ev-text" id="ev-text"></div>
  <div class="choices" id="ev-choices"></div>
</div>

<!-- ===== 戰利品 ===== -->
<div class="screen" id="s-loot">
  <div class="center-box" style="margin:0;padding:8px 0">
    <div class="big" id="loot-icon">🎁</div>
    <h2 id="loot-title">戰利品</h2>
    <p id="loot-sub"></p>
  </div>
  <div id="loot-body"></div>
  <div class="spacer"></div>
  <button class="btn primary" onclick="afterLoot()">繼續</button>
</div>

<!-- ===== 結算 ===== -->
<div class="screen" id="s-result">
  <div class="center-box">
    <div class="big" id="res-icon">💀</div>
    <h2 id="res-title"></h2>
    <p id="res-sub"></p>
  </div>
  <div id="res-body"></div>
  <div class="spacer"></div>
  <button class="btn primary" onclick="backToCamp()">回到營地</button>
</div>

</div>
<div class="sheet-mask" id="sheet-mask" onclick="if(event.target===this)closeSheet()"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<script src="data.js?v=347"></script><script src="core.js?v=347"></script><script src="account.js?v=347"></script><script src="items.js?v=347"></script><script src="battle.js?v=347"></script><script src="run.js?v=347"></script><script src="ui.js?v=347"></script>
</body>
</html>
