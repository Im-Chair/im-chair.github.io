<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0d12">
<title>貪婪深淵</title>
<style>
:root{
  --bg:#0b0d12; --panel:#141824; --panel2:#1b2132; --line:#2a3145;
  --text:#e6e1d3; --dim:#8b8fa3; --gold:#d8a84c; --red:#d05252;
  --green:#6fbf8f; --blue:#5a9bd4; --orange:#e0813f; --white-r:#b8bcc8;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg); color:var(--text);
  font-family:"PingFang TC","Noto Sans TC",-apple-system,sans-serif;
  font-size:15px; line-height:1.5;
  background-image:radial-gradient(ellipse 120% 60% at 50% -10%, #171c2b 0%, var(--bg) 60%);
  user-select:none;-webkit-user-select:none;
}
#app{max-width:520px;margin:0 auto;height:100%;height:100dvh;display:flex;flex-direction:column;position:relative;}
.screen{display:none;flex:1;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(20px + var(--safe-b));}
.screen.show{display:flex;}
h1.title{
  font-family:"Songti TC","Noto Serif TC",serif; font-weight:700;
  font-size:44px; letter-spacing:12px; text-indent:12px; text-align:center;
  background:linear-gradient(180deg,#f0d896 20%,#b8842e 90%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(216,168,76,.15);
}
.subtitle{text-align:center;color:var(--dim);letter-spacing:6px;text-indent:6px;font-size:13px;margin-top:6px;}
.btn{
  display:block;width:100%;padding:14px;border:1px solid var(--line);border-radius:10px;
  background:var(--panel);color:var(--text);font-size:16px;font-family:inherit;
  text-align:center;cursor:pointer;transition:transform .08s, background .15s;
}
.btn:active{transform:scale(.97);background:var(--panel2);}
.btn.primary{border-color:#8a6a2a;background:linear-gradient(180deg,#2a2416,#1e1a10);color:var(--gold);letter-spacing:2px;}
.btn.danger{border-color:#5a2a2a;color:var(--red);}
.btn.small{padding:8px 12px;font-size:14px;width:auto;display:inline-block;}
.btn:disabled{opacity:.35;pointer-events:none;}
.row{display:flex;gap:10px;}
.row .btn{flex:1;}
.spacer{flex:1;}
/* ---------- top bar ---------- */
.topbar{display:flex;align-items:center;gap:10px;padding:4px 2px 12px;font-size:14px;color:var(--dim);}
.topbar .depth{
  font-family:"Songti TC",serif;font-size:15px;color:var(--gold);letter-spacing:2px;
  border:1px solid #3a3220;border-radius:8px;padding:2px 10px;background:#17140c;
}
.topbar .gold-chip{margin-left:auto;color:var(--gold);}
/* ---------- class select ---------- */
.class-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
.class-card{
  border:1px solid var(--line);border-radius:12px;background:var(--panel);
  padding:14px 12px;text-align:center;cursor:pointer;transition:border-color .15s;
}
.class-card.selected{border-color:var(--gold);background:#1a1710;box-shadow:0 0 0 1px var(--gold) inset;}
.class-card .ci{font-size:34px;}
.class-card .cn{font-size:17px;margin-top:6px;letter-spacing:2px;}
.class-card .cd{font-size:12px;color:var(--dim);margin-top:4px;min-height:3em;}
/* ---------- camp ---------- */
.camp-hero{
  text-align:center;padding:22px 0 14px;
}
.camp-hero .flame{font-size:42px;animation:flick 2.2s ease-in-out infinite;}
@keyframes flick{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.82;transform:scale(1.05)}}
.menu-list{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.menu-item{
  display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--line);
  border-radius:12px;background:var(--panel);cursor:pointer;
}
.menu-item:active{background:var(--panel2);}
.menu-item .mi{font-size:22px;width:30px;text-align:center;}
.menu-item .mt{font-size:16px;letter-spacing:1px;}
.menu-item .ms{font-size:12px;color:var(--dim);}
.menu-item .arrow{margin-left:auto;color:var(--dim);}
/* ---------- gear ---------- */
.slot-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;}
.slot{
  border:1px dashed var(--line);border-radius:10px;padding:10px 8px;text-align:center;
  background:var(--panel);min-height:74px;cursor:pointer;
}
.slot .sl{font-size:11px;color:var(--dim);}
.slot .sn{font-size:13px;margin-top:4px;line-height:1.3;}
.item-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.item-row{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);
  border-radius:10px;background:var(--panel);cursor:pointer;
}
.item-row .in{font-size:14px;}
.item-row .is{font-size:12px;color:var(--dim);margin-left:auto;white-space:nowrap;}
.r-white{color:var(--white-r);} .r-blue{color:var(--blue);} .r-gold{color:var(--gold);} .r-orange{color:var(--orange);}
.b-white{border-color:#3a3f4d;} .b-blue{border-color:#2c4d6e;} .b-gold{border-color:#6e5a26;} .b-orange{border-color:#7a4622;}
.tag-new{font-size:10px;color:var(--bg);background:var(--gold);border-radius:4px;padding:1px 5px;margin-left:6px;}
/* ---------- sheet ---------- */
.sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:50;}
.sheet-mask.show{display:flex;align-items:flex-end;justify-content:center;}
.sheet{
  width:100%;max-width:520px;background:var(--panel2);border-radius:18px 18px 0 0;
  border:1px solid var(--line);border-bottom:none;padding:18px 18px calc(24px + var(--safe-b));
  animation:up .18s ease-out;max-height:78vh;overflow-y:auto;
}
@keyframes up{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.sheet h3{font-size:18px;letter-spacing:1px;}
.affix{font-size:13px;color:var(--green);margin-top:2px;}
.sheet .base{font-size:14px;color:var(--dim);margin:6px 0;}
.cmp{font-size:12px;color:var(--dim);border-top:1px solid var(--line);margin-top:10px;padding-top:8px;}
.cmp .up{color:var(--green);} .cmp .dn{color:var(--red);}
/* ---------- doors / decision ---------- */
.depth-gauge{
  text-align:center;margin:8px 0 4px;font-family:"Songti TC",serif;
}
.depth-gauge .num{font-size:52px;color:var(--gold);letter-spacing:4px;}
.depth-gauge .lbl{font-size:13px;color:var(--dim);letter-spacing:4px;}
.depth-gauge .bonus{font-size:12px;color:var(--orange);margin-top:2px;}
.door-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
.door{
  border:1px solid #3a3145;border-radius:12px 12px 4px 4px;
  background:linear-gradient(180deg,#1d1826 0%,#141019 100%);
  padding:26px 10px 18px;text-align:center;cursor:pointer;position:relative;
  box-shadow:inset 0 -10px 24px rgba(0,0,0,.5);
  transition:transform .1s;
}
.door:active{transform:scale(.96);}
.door::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:70%;height:3px;border-radius:3px;background:#2c2438;}
.door .di{font-size:38px;filter:drop-shadow(0 0 10px rgba(216,168,76,.2));}
.door .dn{margin-top:10px;font-size:15px;letter-spacing:2px;}
.door .dd{font-size:11px;color:var(--dim);margin-top:3px;}
.retreat-btn{
  margin-top:6px;border:1px solid #2f4436;background:#101a14;color:var(--green);
  letter-spacing:2px;
}
/* ---------- battle ---------- */
#battle{padding-bottom:calc(12px + var(--safe-b));}
.enemy-zone{padding:6px 0 4px;text-align:center;position:relative;}
.enemy-icon{font-size:64px;display:inline-block;transition:transform .1s;filter:drop-shadow(0 6px 16px rgba(0,0,0,.6));}
.enemy-icon.hit{animation:shake .3s;}
@keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-7px)}50%{transform:translateX(6px)}75%{transform:translateX(-3px)}100%{transform:none}}
.enemy-name{font-size:16px;letter-spacing:2px;margin-top:2px;}
.enemy-name .elite{color:var(--orange);} .enemy-name .boss{color:var(--red);}
.intent{
  display:inline-flex;align-items:center;gap:6px;margin-top:6px;
  border:1px solid #4a3a2a;background:#1c150e;border-radius:20px;padding:4px 14px;
  font-size:14px;color:#e8c78a;
}
.intent .ii{font-size:16px;}
.hpbar{height:14px;border-radius:7px;background:#22161a;border:1px solid #3a2530;overflow:hidden;margin-top:8px;position:relative;}
.hpbar .fill{height:100%;background:linear-gradient(90deg,#a83a3a,#d05252);transition:width .3s;border-radius:7px;}
.hpbar.player .fill{background:linear-gradient(90deg,#3f7a58,#6fbf8f);}
.hpbar .txt{position:absolute;inset:0;text-align:center;font-size:10px;line-height:14px;color:#fff;text-shadow:0 1px 2px #000;}
.status-row{display:flex;gap:6px;justify-content:center;margin-top:6px;min-height:22px;flex-wrap:wrap;}
.st{font-size:11px;border-radius:6px;padding:1px 7px;border:1px solid var(--line);background:var(--panel);}
.st.bad{color:#e09090;border-color:#4a2a2a;} .st.good{color:#9fd8b4;border-color:#2a4a36;}
.blk{color:var(--blue);border-color:#2c4d6e;}
#log{
  flex:0 0 auto;height:64px;overflow-y:auto;font-size:12px;color:var(--dim);
  border:1px solid var(--line);border-radius:10px;background:rgba(0,0,0,.25);
  padding:6px 10px;margin:10px 0;
}
#log .l-dmg{color:#e8a0a0;} #log .l-heal{color:#9fd8b4;} #log .l-sys{color:#c8b070;}
.player-zone{margin-top:auto;}
.pz-top{display:flex;align-items:center;gap:10px;font-size:13px;}
.pz-top .pname{letter-spacing:1px;}
.energy{margin-left:auto;display:flex;gap:4px;}
.pip{width:14px;height:14px;border-radius:50%;border:1px solid #6e5a26;background:#17140c;}
.pip.on{background:radial-gradient(circle at 35% 35%, #f0d896, #b8842e);box-shadow:0 0 6px rgba(216,168,76,.5);}
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.skill-btn{
  border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--text);
  padding:10px 10px;text-align:left;font-family:inherit;cursor:pointer;position:relative;
}
.skill-btn:active{background:var(--panel2);}
.skill-btn:disabled{opacity:.35;}
.skill-btn .sn{font-size:14px;letter-spacing:1px;}
.skill-btn .sd{font-size:11px;color:var(--dim);margin-top:2px;line-height:1.35;}
.skill-btn .sc{position:absolute;top:8px;right:10px;font-size:12px;color:var(--gold);}
.battle-bottom{display:flex;gap:8px;margin-top:10px;}
.battle-bottom .btn{padding:11px;}
.float-dmg{
  position:absolute;left:50%;top:30%;transform:translateX(-50%);
  font-size:26px;font-weight:700;color:#ff9090;pointer-events:none;
  animation:floatup .8s ease-out forwards;text-shadow:0 2px 6px #000;z-index:5;
}
.float-dmg.heal{color:#9fd8b4;} .float-dmg.blocked{color:#8ab4d8;font-size:20px;}
.float-dmg.crit{color:#ffcf5a;font-size:32px;}
@keyframes floatup{from{opacity:1;margin-top:0}to{opacity:0;margin-top:-46px}}
/* ---------- loot / event / result ---------- */
.center-box{margin:auto 0;text-align:center;padding:20px 0;}
.center-box .big{font-size:56px;}
.center-box h2{font-family:"Songti TC",serif;font-size:26px;letter-spacing:6px;margin:12px 0 6px;}
.center-box p{color:var(--dim);font-size:14px;}
.loot-card{
  border-radius:12px;padding:14px;margin:14px 0;background:var(--panel);
  border:1px solid var(--line);text-align:left;
}
.ev-text{font-size:15px;line-height:1.8;color:#d8d2c2;margin:14px 0;white-space:pre-line;}
.choices{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0;}
.stat-box{border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center;background:var(--panel);}
.stat-box .v{font-size:20px;color:var(--gold);font-family:"Songti TC",serif;}
.stat-box .k{font-size:11px;color:var(--dim);margin-top:2px;}
.potion-row{display:flex;gap:8px;margin-top:8px;}
.potion{
  flex:1;border:1px solid var(--line);border-radius:10px;background:var(--panel);
  padding:8px 4px;text-align:center;font-size:12px;color:var(--dim);cursor:pointer;
}
.potion .pi{font-size:20px;display:block;}
.potion:active{background:var(--panel2);}
.toast{
  position:fixed;top:14%;left:50%;transform:translateX(-50%);
  background:#1c150e;border:1px solid #4a3a2a;color:#e8c78a;border-radius:20px;
  padding:8px 18px;font-size:14px;z-index:99;opacity:0;transition:opacity .2s;pointer-events:none;
  max-width:80%;text-align:center;
}
.toast.show{opacity:1;}
.section-title{font-size:13px;color:var(--dim);letter-spacing:2px;margin:14px 0 6px;border-left:3px solid var(--gold);padding-left:8px;}
.back-link{color:var(--dim);font-size:14px;padding:8px 0;cursor:pointer;display:inline-block;}
</style>
</head>
<body>
<div id="app">

<!-- ===== 標題 ===== -->
<div class="screen" id="s-title">
  <div class="spacer"></div>
  <h1 class="title">貪婪深淵</h1>
  <div class="subtitle">深入一層，或帶著一切離開</div>
  <div class="spacer"></div>
  <button class="btn primary" onclick="titleStart()">進入深淵</button>
  <div style="height:10px"></div>
  <button class="btn danger" id="btn-wipe" onclick="wipeConfirm()" style="display:none">放棄一切重新開始</button>
  <div class="spacer"></div>
</div>

<!-- ===== 職業 ===== -->
<div class="screen" id="s-class">
  <div class="section-title">選擇你的職業</div>
  <div class="class-grid" id="class-grid"></div>
  <div class="spacer"></div>
  <button class="btn primary" onclick="confirmClass()">就是他了</button>
</div>

<!-- ===== 營地 ===== -->
<div class="screen" id="s-camp">
  <div class="topbar">
    <span id="camp-cls"></span>
    <span class="gold-chip">🪙 <span id="camp-gold">0</span></span>
  </div>
  <div class="camp-hero">
    <div class="flame">🔥</div>
    <div style="color:var(--dim);font-size:13px;margin-top:6px">深淵入口的營地。火堆之外，只有往下的路。</div>
  </div>
  <div class="stat-grid">
    <div class="stat-box"><div class="v" id="rec-deep">0</div><div class="k">最深紀錄</div></div>
    <div class="stat-box"><div class="v" id="rec-runs">0</div><div class="k">探索次數</div></div>
    <div class="stat-box"><div class="v" id="rec-boss">0</div><div class="k">首領擊殺</div></div>
  </div>
  <div class="menu-list">
    <div class="menu-item" onclick="startRun()">
      <span class="mi">🕳</span><span><div class="mt">下潛</div><div class="ms">開始新的探索</div></span><span class="arrow">›</span>
    </div>
    <div class="menu-item" onclick="openGear()">
      <span class="mi">🎒</span><span><div class="mt">裝備與倉庫</div><div class="ms" id="stash-count"></div></span><span class="arrow">›</span>
    </div>
    <div class="menu-item" onclick="openSmith()">
      <span class="mi">⚒️</span><span><div class="mt">鐵匠</div><div class="ms">強化身上的武器與護甲</div></span><span class="arrow">›</span>
    </div>
  </div>
</div>

<!-- ===== 裝備 ===== -->
<div class="screen" id="s-gear">
  <span class="back-link" onclick="showScreen('s-camp')">‹ 回營地</span>
  <div class="section-title">身上裝備</div>
  <div class="slot-row" id="equip-row"></div>
  <div class="section-title">倉庫 <span id="gear-gold" style="float:right;color:var(--gold)"></span></div>
  <div class="item-list" id="stash-list"></div>
</div>

<!-- ===== 鐵匠 ===== -->
<div class="screen" id="s-smith">
  <span class="back-link" onclick="showScreen('s-camp')">‹ 回營地</span>
  <div class="center-box" style="padding:10px 0">
    <div class="big">⚒️</div>
    <p>把碎金交給老鐵匠，他會替你把裝備敲得更兇。</p>
  </div>
  <div class="item-list" id="smith-list"></div>
  <p style="color:var(--dim);font-size:12px;margin-top:12px">強化直接附在該件裝備上；分解裝備時強化不會退款。</p>
</div>

<!-- ===== 抉擇（門）===== -->
<div class="screen" id="s-doors">
  <div class="topbar">
    <span class="depth">第 <span id="d-floor">1</span> 層</span>
    <span id="d-hp"></span>
    <span class="gold-chip">🪙 <span id="d-gold">0</span></span>
  </div>
  <div class="depth-gauge">
    <div class="lbl">目前深度</div>
    <div class="num" id="d-floor-big">1</div>
    <div class="bonus" id="d-bonus"></div>
  </div>
  <div class="door-grid" id="door-grid"></div>
  <button class="btn retreat-btn" onclick="retreat()">🪢 拉繩上升——帶著這趟的一切撤退</button>
  <div style="height:8px"></div>
  <div style="text-align:center;font-size:12px;color:var(--dim)" id="bag-hint"></div>
  <div class="potion-row" id="door-potions"></div>
</div>

<!-- ===== 戰鬥 ===== -->
<div class="screen" id="s-battle">
  <div class="topbar">
    <span class="depth">第 <span id="b-floor">1</span> 層</span>
    <span class="gold-chip">🪙 <span id="b-gold">0</span></span>
  </div>
  <div class="enemy-zone" id="enemy-zone">
    <div class="enemy-icon" id="e-icon">👾</div>
    <div class="enemy-name" id="e-name">???</div>
    <div><span class="intent" id="e-intent"></span></div>
    <div class="hpbar"><div class="fill" id="e-hpfill"></div><div class="txt" id="e-hptxt"></div></div>
    <div class="status-row" id="e-status"></div>
  </div>
  <div id="log"></div>
  <div class="player-zone" id="player-zone" style="position:relative">
    <div class="pz-top">
      <span class="pname" id="p-name"></span>
      <span class="st blk" id="p-block" style="display:none"></span>
      <span class="energy" id="p-energy"></span>
    </div>
    <div class="hpbar player"><div class="fill" id="p-hpfill"></div><div class="txt" id="p-hptxt"></div></div>
    <div class="status-row" id="p-status"></div>
    <div class="skill-grid" id="skill-grid"></div>
    <div class="battle-bottom">
      <button class="btn" style="flex:0 0 30%" onclick="openBattlePotions()">🧪 道具</button>
      <button class="btn primary" id="btn-end" onclick="endTurn()">結束回合</button>
    </div>
  </div>
</div>

<!-- ===== 事件 ===== -->
<div class="screen" id="s-event">
  <div class="topbar">
    <span class="depth">第 <span id="ev-floor">1</span> 層</span>
    <span class="gold-chip">🪙 <span id="ev-gold">0</span></span>
  </div>
  <div class="center-box" style="margin:0;padding:8px 0"><div class="big" id="ev-icon">❓</div>
  <h2 id="ev-title"></h2></div>
  <div class="ev-text" id="ev-text"></div>
  <div class="choices" id="ev-choices"></div>
</div>

<!-- ===== 戰利品 ===== -->
<div class="screen" id="s-loot">
  <div class="center-box" style="margin:0;padding:8px 0">
    <div class="big" id="loot-icon">🎁</div>
    <h2 id="loot-title">戰利品</h2>
    <p id="loot-sub"></p>
  </div>
  <div id="loot-body"></div>
  <div class="spacer"></div>
  <button class="btn primary" onclick="afterLoot()">繼續</button>
</div>

<!-- ===== 結算 ===== -->
<div class="screen" id="s-result">
  <div class="center-box">
    <div class="big" id="res-icon">💀</div>
    <h2 id="res-title"></h2>
    <p id="res-sub"></p>
  </div>
  <div id="res-body"></div>
  <div class="spacer"></div>
  <button class="btn primary" onclick="backToCamp()">回到營地</button>
</div>

</div>
<div class="sheet-mask" id="sheet-mask" onclick="if(event.target===this)closeSheet()"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
/* ================= 資料 ================= */
const CLASSES = {
  sword:{name:'劍士', icon:'🛡️', hp:78, crit:5,

/* ================= 裝備生成 ================= */
function rollRarity(floor, bonus){ // bonus: 0一般 1精英 2首領
  let w = Math.max(46 - floor*3 - bonus*18, 2);
  let b = 32 + bonus*4;
  let g = 13 + floor*1.1 + bonus*10;
  let o = 2.5 + floor*0.8 + bonus*7;
  const total = w+b+g+o; let r = Math.random()*total;
  if((r-=w)<0) return 0; if((r-=b)<0) return 1; if((r-=g)<0) return 2; return 3;
}
function makeItem(floor, bonus){
  const ri = rollRarity(floor, bonus||0), rar = RARITIES[ri];
  const slot = pick(['w','w','a','a','t']);
  const it = {id:uid++, slot, rar:ri, up:0, banked:false, affixes:[]};
  if(slot==='w'){ it.base = Math.round(2 + floor*0.7 + rar.mult); it.name = pick(WEAPON_NAMES); }
  else if(slot==='a'){ it.base = Math.round(7 + floor*1.3 + rar.mult*4); it.name = pick(ARMOR_NAMES); }
  else { it.base = 0; it.name = pick(TRINKET_NAMES); }
  it.name = pick(PREFIX[rar.id]) + it.name;
  const n = rnd(rar.afx[0], rar.afx[1]);
  const pool = Object.keys(AFFIXES).filter(k=>AFFIXES[k].slots.includes(slot));
  const chosen = [];
  for(let i=0;i<n && pool.length;i++){
    const k = pool.splice(Math.floor(Math.random()*pool.length),1)[0];
    const a = AFFIXES[k];
    const v = Math.round(Math.min(a.max*1.4, rnd(a.min, a.max) * (1 + floor*0.015)));
    chosen.push({k, v});
  }
  it.affixes = chosen;
  return it;
}
function itemStatLine(it){
  if(it.slot==='w') return `攻擊 +${it.base + it.up}`;
  if(it.slot==='a') return `生命上限 +${it.base + it.up*4}`;
  return '飾品';
}
function slotName(s){ return s==='w'?'武器':s==='a'?'護甲':'飾品'; }

/* 彙總玩家所有詞綴 */
function sumAffix(key){
  let v = 0;
  for(const s of ['w','a','t']){
    const it = G.equip[s]; if(!it) continue;
    for(const a of it.affixes) if(a.k===key) v += a.v;
  }
  if(R && R.bless) for(const b of R.bless) if(b.k===key) v += b.v;
  return v;
}
function playerMaxHp(){
  let hp = CLASSES[G.cls].hp + sumAffix('hp');
  const a = G.equip.a; if(a) hp += a.base + a.up*4;
  return hp;
}
function playerAtk(){ const w = G.equip.w; return (w? w.base + w.up : 0) + sumAffix('str'); }
function playerCrit(){ return CLASSES[G.cls].crit + sumAffix('crit'); }

    d.onclick = ()=>openItemSheet(it, 'stash');
    sl.appendChild(d);

function affixHtml(it){
  return it.affixes.map(a=>`<div class="affix">◆ ${AFFIXES[a.k].n}：${AFFIXES[a.k].fmt(a.v)}</div>`).join('') ||
    '<div class="affix" style="color:var(--dim)">（無詞綴）</div>';
}
function compareHtml(it){
  const cur = G.equip[it.slot];
  if(!cur || cur.id===it.id) return '';
  let lines = [`<div class="cmp">替換：<span class="${RARITIES[cur.rar].cls}">${cur.name}${cur.up?'+'+cur.up:''}</span>`];
  if(it.slot==='w'){ const d = (it.base+it.up)-(cur.base+cur.up);
    lines.push(`<div>攻擊 ${d>=0?'<span class="up">+'+d+'</span>':'<span class="dn">'+d+'</span>'}</div>`); }
  if(it.slot==='a'){ const d = (it.base+it.up*4)-(cur.base+cur.up*4);
    lines.push(`<div>生命 ${d>=0?'<span class="up">+'+d+'</span>':'<span class="dn">'+d+'</span>'}</div>`); }
  lines.push('</div>');
  return lines.join('');
}
function openItemSheet(it, from){
  const r = RARITIES[it.rar];
  const salvage = 6 + it.rar*10 + Math.floor(it.base/2);
  let btns = '';
  if(from==='stash') btns = `<button class="btn primary" onclick="equipFromStash(${it.id})">裝備</button>
    <button class="btn danger" onclick="salvageItem(${it.id})">分解 +${salvage}🪙</button>`;
  else if(from==='equipped') btns = `<button class="btn" onclick="unequipItem('${it.slot}')">卸下</button>`;
  else if(from==='bag') btns = `<button class="btn primary" onclick="equipFromBag(${it.id})">立刻換上</button>`;
  openSheet(`<h3 class="${r.cls}">${it.name}${it.up?' +'+it.up:''}</h3>
    <div class="base">${r.n}${slotName(it.slot)}｜${itemStatLine(it)}${it.banked===false&&from!=='equipped'&&R?'｜<span style="color:var(--orange)">未保管</span>':''}</div>
    ${affixHtml(it)}${compareHtml(it)}
    <div class="row" style="margin-top:16px">${btns}<button class="btn" onclick="closeSheet()">關閉</button></div>`);
}
function equipFromStash(id){
  const i = G.stash.findIndex(x=>x.id===id); if(i<0) return;
  const it = G.stash.splice(i,1)[0];
  if(G.equip[it.slot]) G.stash.push(G.equip[it.slot]);
  G.equip[it.slot] = it; closeSheet(); renderGear(); save(); toast('已裝備 '+it.name);
}
function unequipItem(s){
  if(!G.equip[s]) return; G.stash.push(G.equip[s]); G.equip[s]=null;
  closeSheet(); renderGear(); save();
}
function salvageItem(id){
  const i = G.stash.findIndex(x=>x.id===id); if(i<0) return;
  const it = G.stash[i];
  const v = 6 + it.rar*10 + Math.floor(it.base/2);
  G.stash.splice(i,1); G.gold += v; closeSheet(); renderGear(); save(); toast(`分解得 ${v} 碎金`);
}

    const d = document.createElement('div'); d.className = `item-row ${RARITIES[it.rar].b}`;

function doorPool(){
  const f = R.floor;
  const pool = [];
  pool.push({t:'fight', i:'⚔️', n:'戰鬥', d:'普通的敵人', w:42});
  if(f>=3) pool.push({t:'elite', i:'😈', n:'精英', d:'更強，掉落更好', w:16});
  pool.push({t:'event', i:'❓', n:'未知', d:'誰知道呢', w:22});
  pool.push({t:'rest', i:'🕯️', n:'營火', d:'回復 30% 生命', w:12});
  pool.push({t:'chest', i:'📦', n:'寶箱', d:'看起來沒上鎖', w:8});
  return pool;
}
function weightedPick(pool){
  const total = pool.reduce((s,p)=>s+p.w,0); let r = Math.random()*total;
  for(const p of pool){ if((r-=p.w)<0) return p; } return pool[0];
}
function showDoors(){

    grid.style.gridTemplateColumns = '1fr';

/* ================= 敵人 ================= */
function scaleMult(floor){ return 1 + (floor-1)*0.13; }
function makeEnemy(floor, elite){
  const band = floor<=4?1 : floor<=9?2 : 3;
  const pool = Object.values(ENEMIES).filter(e=>e.band===band || (band===3 && e.band>=2 && floor>=12));
  const t = pick(pool);
  const m = scaleMult(floor) * (elite?1.65:1);
  return {n:(elite?'精英・':'')+t.n, i:t.i, hp:Math.round(t.hp*m), maxhp:Math.round(t.hp*m),
    pat:t.pat, pi:0, block:0, st:{}, mult:m/(elite?1.65:1)*(elite?1.35:1), elite:elite?1:0, boss:false};
}
function makeBoss(floor){
  const b = BOSSES[(floor/5 - 1) % BOSSES.length];
  const m = scaleMult(floor)*1.05;
  return {n:b.n, i:b.i, hp:Math.round(b.hp*m), maxhp:Math.round(b.hp*m),
    pat:b.pat, pi:0, block:0, st:{}, mult:m, elite:2, boss:true, intro:b.intro};
}
function enemyMove(e){ return e.pat[e.pi % e.pat.length]; }
function bossFor(floor){ return BOSSES[(floor/5 - 1) % BOSSES.length]; }
function intentText(e){
  const mv = enemyMove(e);
  const v = mv.v ? Math.round(mv.v * e.mult) : 0;
  switch(mv.t){
    case 'a': return ['🗡️', (mv.nm||'攻擊')+' '+v];
    case 'h': return ['💥', (mv.nm||'重擊')+' '+v];
    case 'm': return ['🌀', (mv.nm||'連擊')+' '+v+'×'+mv.x];
    case 'd': return ['🛡️', '防禦 '+v];
    case 'c': return ['🌫️', mv.nm||'詛咒'];
    case 'v': return ['🩸', (mv.nm||'吸血')+' '+v];
    case 's': return ['🪙', (mv.nm||'偷竊')+' '+v];
    case 'g': return ['⏳', mv.nm||'蓄力'];
  }
  return ['❔','？'];
}

function skillDesc(sid){
  const s = SKILLS[sid], f = s.f;
  if(f.dmg){ const d = calcPlayerDmg(f.dmg, true);
    return s.d.replace(/\d+ 點傷害/, d+' 點傷害'); }
  if(f.poisonDmg){ const stacks = B&&B.e.st.poison||0; const d = stacks? calcPlayerDmg(stacks*f.poisonDmg, true): calcPlayerDmg(5,true);
    return `造成 ${d} 點傷害（中毒層數×${f.poisonDmg}）`; }

function statusHtml(st, block){
  const M = {poison:['☠️ 中毒','bad'],burn:['🔥 燃燒','bad'],weak:['💤 虛弱','bad'],vuln:['🎯 易傷','bad'],stun:['💫 暈眩','bad']};
  let h = '';
  for(const [k,v] of Object.entries(st)) if(v>0 && M[k]) h += `<span class="st ${M[k][1]}">${M[k][0]} ${v}</span>`;
  if(block>0) h += `<span class="st blk">🛡 ${block}</span>`;

}
function calcPlayerDmg(base, preview){
  let d = base + playerAtk();
  if(B && B.st.weak) d = Math.round(d*0.75);
  if(B && B.e.st.vuln) d = Math.round(d*1.5);

function useSkill(sid){
  if(B.over) return;
  const s = SKILLS[sid], f = s.f;
  if(B.energy < s.c) return;
  B.energy -= s.c;
  if(f.block){ B.block += f.block; log(`${s.n}：獲得 ${f.block} 格擋。`); }
  if(f.heal){ const h = Math.min(f.heal, playerMaxHp()-R.hp); R.hp += h;
    log(`${s.n}：回復 ${h} 血。`,'heal'); floatDmg('player-zone','+'+h,'heal'); }
  if(f.nextCrit){ B.nextCrit = true; }
  let dmg = 0;
  if(f.dmg) dmg = f.dmg;
  if(f.poisonDmg){ const st = B.e.st.poison||0; dmg = st? st*f.poisonDmg : 5; }
  if(dmg > 0) dealToEnemy(dmg, s, f);

}
function applyStatus(target, ap, name){

function dealToEnemy(base, s, f){

  if(B.nextCrit || Math.random()*100 < playerCrit()){ d = Math.round(d*1.6); crit = true; B.nextCrit = false; }
  let absorbed = 0;
  if(e.block > 0){ absorbed = Math.min(e.block, d); e.block -= absorbed; d -= absorbed; }
  e.hp -= d;

  floatDmg('enemy-zone', crit? d+'!':'-'+d, crit?'crit': d===0?'blocked':'');
  log(`${s.n} 造成 ${d} 傷害${crit?'（爆擊！）':''}${absorbed?`（${absorbed} 被格擋）`:''}。`,'dmg');
  // 攻擊觸發詞綴
  if(d>0){
    const vamp = sumAffix('vamp') + (f.drain? f.drain*100:0);
    if(vamp>0){ const h = Math.max(1, Math.round(d*vamp/100)); const real = Math.min(h, playerMaxHp()-R.hp);
      if(real>0){ R.hp += real; log(`吸血回復 ${real}。`,'heal'); } }
    const pt = sumAffix('ptouch'); if(pt) applyStatus(e.st, {poison:pt});
    const bt = sumAffix('btouch'); if(bt) applyStatus(e.st, {burn:bt});
  }
  if(f && f.apply) applyStatus(e.st, f.apply);
  if(e.hp<=0 && f && f.execKill){ R.execEnergy = 2; const h=Math.min(6,playerMaxHp()-R.hp); R.hp+=h;
    log('處決成功！下場戰鬥 +2 能量，回復 '+h+' 血。','sys'); }
}
function endTurn(){
  if(B.over) return;
  // 敵人燃燒在玩家回合結束時結算（提示：燃燒減半）
  tickBurn(B.e, 'enemy-zone', B.e.n);
  if(B.e.hp<=0){ winBattle(); return; }
  enemyTurn();
}
function tickBurn(who, zone, name){
  if(who.st && who.st.burn){
    const d = who.st.burn;
    if(who===B.e){ who.hp -= d; } else { R.hp = Math.max(0, R.hp - d); }
    log(`${name}受到 ${d} 點燃燒傷害。`,'dmg');
    floatDmg(zone, '-'+d, '');
    who.st.burn = Math.floor(who.st.burn/2);
    if(!who.st.burn) delete who.st.burn;
  }
}
function enemyTurn(){
  const e = B.e;
  // 敵人中毒
  if(e.st.poison){ const d = e.st.poison; e.hp -= d;
    log(`${e.n} 中毒受到 ${d} 傷害。`,'dmg'); floatDmg('enemy-zone','-'+d,'');
    e.st.poison--; if(!e.st.poison) delete e.st.poison;
    if(e.hp<=0){ winBattle(); return; } }
  if(e.st.stun){ e.st.stun--; if(!e.st.stun) delete e.st.stun;
    log(`${e.n} 暈眩中，跳過行動。`,'sys'); afterEnemyAct(); return; }
  const mv = enemyMove(e);
  e.pi++;
  const val = mv.v ? Math.round(mv.v * e.mult) : 0;
  const weakMul = e.st.weak ? 0.75 : 1;
  setTimeout(()=>{
    switch(mv.t){
      case 'a': case 'h': case 'v': case 's': case 'm': {
        const times = mv.x || 1;
        let totalDealt = 0;
        for(let i=0;i<times;i++){
          if(R.hp<=0) break;
          let d = Math.round(val*weakMul);
          if(B.st.vuln) d = Math.round(d*1.5);
          // 閃避
          if(Math.random()*100 < sumAffix('agile')){ log('你閃過了攻擊。','sys'); floatDmg('player-zone','閃避','blocked'); continue; }
          let absorbed = 0;
          if(B.block>0){ absorbed = Math.min(B.block, d); B.block -= absorbed; d -= absorbed; }
          if(d>0){ R.hp = Math.max(0, R.hp - d); totalDealt += d;
            floatDmg('player-zone','-'+d,''); }
          else floatDmg('player-zone','格擋','blocked');
          log(`${e.n} ${mv.nm||'攻擊'}造成 ${d} 傷害${absorbed?`（${absorbed} 被格擋）`:''}。`,'dmg');
          // 荊棘
          const th = sumAffix('thorn');
          if(th && ['a','h','m','v'].includes(mv.t)){ e.hp -= th; log(`荊棘反彈 ${th} 傷害。`,'dmg'); }
          if(mv.t==='v' && d>0){ const h = Math.min(Math.round(d*0.5), e.maxhp - e.hp); if(h>0){ e.hp += h; log(`${e.n} 吸取了 ${h} 生命。`,'heal'); } }
          if(mv.t==='s' && d>0){ const steal = Math.min(R.gold, 10 + R.floor*2); R.gold -= steal; if(steal) log(`${e.n} 偷走了 ${steal} 碎金！`,'sys'); }
        }
        if(mv.ap && totalDealt>0) applyStatus(B.st, mv.ap, null);
        break;
      }
      case 'd': e.block += val; log(`${e.n} 進入防禦（+${val} 格擋）。`); break;
      case 'c': applyStatus(B.st, mv.ap, e.n); break;
      case 'g': log(`${e.n} 正在${mv.nm||'蓄力'}——下一擊會很痛。`,'sys'); break;
    }
    if(e.hp<=0){ winBattle(); return; }
    if(R.hp<=0){ playerDie(); return; }
    afterEnemyAct();
  }, 500);
}
function afterEnemyAct(){
  // 敵人回合結束：玩家燃燒結算、雙方 weak/vuln 遞減
  tickBurn({st:B.st}, 'player-zone', '你');
  if(R.hp<=0){ playerDie(); return; }
  for(const k of ['weak','vuln']){
    if(B.st[k]){ B.st[k]--; if(!B.st[k]) delete B.st[k]; }
    if(B.e.st[k]){ B.e.st[k]--; if(!B.e.st[k]) delete B.e.st[k]; }
  }
  B.turn++;
  startPlayerTurn();
  save();
}
/* ================= 勝負與戰利品 ================= */
function winBattle(){
  if(B.over) return; B.over = true;
  const e = B.e;
  R.kills++;
  if(e.boss) G.rec.boss++;
  // 急救
  const mend = sumAffix('mend');
  if(mend){ const h = Math.min(mend, playerMaxHp()-R.hp); if(h>0) R.hp += h; }
  // 碎金
  let gold = Math.round((8 + R.floor*2.4 + rnd(0,6)) * (e.boss?4 : e.elite?2 : 1));
  gold = Math.round(gold * (1 + sumAffix('greed')/100));
  R.gold += gold;
  // 掉落
  const drops = [];
  const dropChance = e.boss?1 : e.elite?1 : 0.55;
  if(Math.random() < dropChance){
    const bonus = e.boss?2 : e.elite?1 : 0;
    let it = makeItem(R.floor, bonus);
    if(e.boss && it.rar < 2){ it = makeItem(R.floor, 2); it.rar = Math.max(2, it.rar); }
    drops.push(it); R.bag.push(it);
  }
  if(e.boss && Math.random()<0.5){ const it2 = makeItem(R.floor, 1); drops.push(it2); R.bag.push(it2); }
  // 藥水掉落
  let potionDrop = null;
  if(Math.random() < (e.boss?0.8:0.22) && R.potions.length<4){
    potionDrop = pick(Object.keys(POTIONS));
    R.potions.push(potionDrop);
  }
  setTimeout(()=>{
    showLoot(drops, gold, e.boss?'👑':'⚔️', e.boss?'首領倒下了':'戰鬥勝利',
      `獲得 ${gold} 碎金` + (potionDrop? `，撿到 ${POTIONS[potionDrop].i}${POTIONS[potionDrop].n}`:''), mend? `（急救回復 ${mend} 血）`:'');
  }, 600);
  save();
}
function showLoot(items, gold, icon, title, sub, extra){
  R.phase='loot';
  $('loot-icon').textContent = icon;
  $('loot-title').textContent = title;
  $('loot-sub').textContent = (sub||'') + (extra||'');
  const body = $('loot-body'); body.innerHTML = '';
  if(!items.length){
    body.innerHTML = '<p style="text-align:center;color:var(--dim);font-size:13px">這次沒有裝備掉落。</p>';
  }
  for(const it of items){
    const r = RARITIES[it.rar];
    const d = document.createElement('div'); d.className = `loot-card ${r.b}`;
    d.innerHTML = `<div class="${r.cls}" style="font-size:16px">${it.name} <span style="font-size:11px">${r.n}</span></div>
      <div style="font-size:13px;color:var(--dim);margin:4px 0">${slotName(it.slot)}｜${itemStatLine(it)}</div>
      ${affixHtml(it)}${compareHtml(it)}
      <button class="btn small primary" style="margin-top:10px" onclick="equipFromBag(${it.id});this.textContent='已裝上';this.disabled=true">立刻換上</button>`;
    body.appendChild(d);
  }
  save();
  showScreen('s-loot');
}
function equipFromBag(id){
  let it = R.bag.find(x=>x.id===id) || G.stash.find(x=>x.id===id);
  if(!it) return;
  const idx = R.bag.findIndex(x=>x.id===id);
  if(idx>=0) R.bag.splice(idx,1);
  const old = G.equip[it.slot];
  if(old){ if(old.banked!==false) G.stash.push(old); else R.bag.push(old); }
  it.banked = false;
  G.equip[it.slot] = it;
  // 換裝可能改變血量上限
  R.hp = Math.min(R.hp, playerMaxHp());
  closeSheet(); save(); toast('已裝備 '+it.name);
  if(R.phase==='doors') showDoors();
}
function afterLoot(){ nextFloor(); }
/* ================= 藥水 ================= */
function usePotion(idx, inBattle){
  const k = R.potions[idx]; if(!k) return;
  const p = POTIONS[k];
  if(k==='heal'){ const h = Math.min(22, playerMaxHp()-R.hp); R.hp += h; toast(`回復 ${h} 血`); if(inBattle){ log(`喝下治療藥水，回復 ${h} 血。`,'heal'); floatDmg('player-zone','+'+h,'heal'); } }
  else if(k==='energy'){ if(!inBattle) return toast('只能在戰鬥中用'); B.energy += 2; log('灌下烈酒，+2 能量。','sys'); }
  else if(k==='bomb'){ if(!inBattle) return toast('只能在戰鬥中用'); B.e.hp -= 16; log('火油瓶炸出 16 傷害。','dmg'); floatDmg('enemy-zone','-16',''); }
  else if(k==='purge'){ B ? (B.st = {}) : null; toast('負面狀態已清除'); if(inBattle) log('淨化藥水洗去了所有異常。','sys'); }
  R.potions.splice(idx,1);
  save();
  if(inBattle){
    closeSheet();
    if(B.e.hp<=0){ winBattle(); return; }
    renderBattle();
  }
}
function openBattlePotions(){
  if(!R.potions.length){ toast('沒有藥水'); return; }
  let html = '<h3>道具</h3><div class="item-list" style="margin-top:10px">';
  R.potions.forEach((k,i)=>{
    const p = POTIONS[k];
    html += `<div class="item-row" onclick="usePotion(${i},true)"><span>${p.i} ${p.n}</span><span class="is">${p.d}</span></div>`;
  });
  html += '</div><button class="btn" style="margin-top:12px" onclick="closeSheet()">關閉</button>';
  openSheet(html);
}
/* ================= 撤退 / 死亡 ================= */
function retreat(){
  const n = R.bag.length, g = R.gold;
  // 保管一切
  for(const it of R.bag){ it.banked = true; G.stash.push(it); }
  for(const s of ['w','a','t']) if(G.equip[s]) G.equip[s].banked = true;
  G.gold += g;
  const deep = R.floor;
  const kills = R.kills;
  R = null; B = null; save();
  $('res-icon').textContent = '🪢';
  $('res-title').textContent = '平安歸來';
  $('res-sub').textContent = `你在第 ${deep} 層拉了繩子。貪婪是美德，活著兌現它更是。`;
  $('res-body').innerHTML = `<div class="stat-grid">
    <div class="stat-box"><div class="v">${deep}</div><div class="k">抵達深度</div></div>
    <div class="stat-box"><div class="v">${kills}</div><div class="k">擊殺</div></div>
    <div class="stat-box"><div class="v">+${g}</div><div class="k">帶回碎金</div></div>
  </div>` + (n? `<p style="text-align:center;color:var(--green);font-size:13px">${n} 件裝備已存入倉庫。</p>`:'');
  showScreen('s-result');
}
function playerDie(){
  if(B) B.over = true;
  const deep = R.floor, kills = R.kills, lostG = R.gold, lostN = R.bag.length;
  // 未保管的裝備全部消失，裝備欄還原成下潛時的樣子
  G.equip = R.equipBackup;
  R = null; B = null; save();
  setTimeout(()=>{
    $('res-icon').textContent = '💀';
    $('res-title').textContent = '深淵收下了你';
    $('res-sub').textContent = '再貪一層，就這一層——每個死在這裡的人都這麼說過。';
    $('res-body').innerHTML = `<div class="stat-grid">
      <div class="stat-box"><div class="v">${deep}</div><div class="k">倒下深度</div></div>
      <div class="stat-box"><div class="v">${kills}</div><div class="k">擊殺</div></div>
      <div class="stat-box"><div class="v" style="color:var(--red)">-${lostG}</div><div class="k">失去碎金</div></div>
    </div>` + (lostN? `<p style="text-align:center;color:var(--red);font-size:13px">${lostN} 件未保管的裝備沉入了深淵。</p>`:
      '<p style="text-align:center;color:var(--dim);font-size:13px">至少你沒帶什麼可以失去的東西。</p>');
    showScreen('s-result');
  }, 700);
}
function backToCamp(){ renderCamp(); showScreen('s-camp'); }
/* ================= 啟動 ================= */
(function init(){
  load();
  const hasSave = !!G.cls;
  $('btn-wipe').style.display = hasSave? 'block':'none';
  // 存檔中若卡在戰鬥，回到門的畫面重新選（血量保留）
  if(R && R.phase==='battle'){ R.phase='doors'; R.doors=null; R.forceDoor = R.lastDoor || 'fight'; }
  showScreen('s-title');
})();
</script>
